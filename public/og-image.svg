<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3d28"/>
      <stop offset="100%" stop-color="#3a6b47"/>
    </linearGradient>
    <linearGradient id="mtn-fade" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fefdf8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#fefdf8" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7ab8d4" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7ab8d4" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#7ab8d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7ab8d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grille de points discrets -->
  <g fill="#fefdf8" opacity="0.04">
    <circle cx="800" cy="80"  r="2"/><circle cx="860" cy="80"  r="2"/><circle cx="920" cy="80"  r="2"/><circle cx="980" cy="80"  r="2"/><circle cx="1040" cy="80" r="2"/><circle cx="1100" cy="80" r="2"/>
    <circle cx="800" cy="130" r="2"/><circle cx="860" cy="130" r="2"/><circle cx="920" cy="130" r="2"/><circle cx="980" cy="130" r="2"/><circle cx="1040" cy="130" r="2"/><circle cx="1100" cy="130" r="2"/>
    <circle cx="800" cy="180" r="2"/><circle cx="860" cy="180" r="2"/><circle cx="920" cy="180" r="2"/><circle cx="980" cy="180" r="2"/><circle cx="1040" cy="180" r="2"/><circle cx="1100" cy="180" r="2"/>
    <circle cx="800" cy="230" r="2"/><circle cx="860" cy="230" r="2"/><circle cx="920" cy="230" r="2"/><circle cx="980" cy="230" r="2"/><circle cx="1040" cy="230" r="2"/><circle cx="1100" cy="230" r="2"/>
  </g>

  <!-- Montagnes Vercors (silhouette droite) -->
  <path d="M660 630 L700 420 L760 460 L820 340 L880 390 L940 280 L1000 350 L1060 300 L1120 380 L1160 320 L1200 400 L1200 630 Z"
        fill="url(#mtn-fade)"/>
  <!-- Neige sommets -->
  <path d="M940 280 L960 310 L980 295 L1000 315 L1000 350 L940 280 Z" fill="#fefdf8" opacity="0.12"/>
  <path d="M1060 300 L1080 325 L1095 312 L1120 340 L1120 380 L1060 300 Z" fill="#fefdf8" opacity="0.1"/>

  <!-- Rivière Drôme -->
  <path d="M660 540 Q780 520 900 535 Q1020 548 1200 525" stroke="url(#river)" stroke-width="3" fill="none"/>

  <!-- Rangées de vignes (diagonales) -->
  <g stroke="#a8c8a0" stroke-width="1.2" opacity="0.18">
    <line x1="680" y1="580" x2="780" y2="555"/>
    <line x1="680" y1="595" x2="780" y2="570"/>
    <line x1="680" y1="610" x2="780" y2="585"/>
    <line x1="780" y1="558" x2="880" y2="568"/>
    <line x1="780" y1="573" x2="880" y2="583"/>
    <line x1="780" y1="588" x2="880" y2="598"/>
  </g>

  <!-- Nœuds data (constellation) -->
  <g opacity="0.55">
    <!-- Connexions -->
    <line x1="850" y1="170" x2="940" y2="130" stroke="#e8965a" stroke-width="1" opacity="0.4"/>
    <line x1="940" y1="130" x2="1030" y2="160" stroke="#e8965a" stroke-width="1" opacity="0.4"/>
    <line x1="1030" y1="160" x2="1000" y2="230" stroke="#e8965a" stroke-width="1" opacity="0.3"/>
    <line x1="850" y1="170" x2="1000" y2="230" stroke="#e8965a" stroke-width="1" opacity="0.25"/>
    <line x1="940" y1="130" x2="1100" y2="90"  stroke="#e8965a" stroke-width="1" opacity="0.3"/>
    <!-- Nœuds -->
    <circle cx="850"  cy="170" r="5" fill="#e8965a"/>
    <circle cx="940"  cy="130" r="7" fill="#e8965a"/>
    <circle cx="1030" cy="160" r="4" fill="#e8965a" opacity="0.8"/>
    <circle cx="1000" cy="230" r="5" fill="#e8965a" opacity="0.7"/>
    <circle cx="1100" cy="90"  r="4" fill="#e8965a" opacity="0.6"/>
    <!-- Halos -->
    <circle cx="940"  cy="130" r="14" fill="none" stroke="#e8965a" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Barre accent gauche -->
  <rect x="80" y="88" width="5" height="80" rx="3" fill="#e8965a"/>

  <!-- Nom -->
  <text x="104" y="138"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="26" font-weight="600" letter-spacing="0.04em"
        fill="#e8965a" opacity="0.9">L'OCTET À LA MENTHE</text>

  <!-- Titre principal -->
  <text x="104" y="215"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="66" font-weight="800"
        fill="#fefdf8">Consultant</text>
  <text x="104" y="292"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="66" font-weight="800"
        fill="#fefdf8">Data &amp; IA</text>

  <!-- Sous-titre -->
  <text x="104" y="358"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400"
        fill="#fefdf8" opacity="0.65">
    Diagnostic · Stratégie · Mise en œuvre
  </text>

  <!-- Pills services -->
  <!-- Pill 1: Diag Data IA Bpifrance -->
  <rect x="104" y="400" width="258" height="40" rx="20" fill="#fefdf8" opacity="0.1"/>
  <text x="233" y="425"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="17" font-weight="600" text-anchor="middle"
        fill="#fefdf8" opacity="0.9">Diag Data IA Bpifrance</text>

  <!-- Pill 2: IA Booster -->
  <rect x="374" y="400" width="160" height="40" rx="20" fill="#fefdf8" opacity="0.1"/>
  <text x="454" y="425"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="17" font-weight="600" text-anchor="middle"
        fill="#fefdf8" opacity="0.9">IA Booster</text>

  <!-- Pill 3: PME / ETI -->
  <rect x="546" y="400" width="120" height="40" rx="20" fill="#e8965a" opacity="0.25"/>
  <text x="606" y="425"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="17" font-weight="600" text-anchor="middle"
        fill="#e8965a">PME / ETI</text>

  <!-- Séparateur bas -->
  <line x1="80" y1="510" x2="580" y2="510" stroke="#fefdf8" stroke-width="1" opacity="0.15"/>

  <!-- Localisation -->
  <text x="80" y="548"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="20" font-weight="500"
        fill="#fefdf8" opacity="0.5">Die · Drôme · Auvergne-Rhône-Alpes</text>

  <!-- URL -->
  <text x="80" y="588"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700" letter-spacing="0.05em"
        fill="#fefdf8" opacity="0.35">oalam.org</text>
</svg>
